<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Me Ma Mana Ruchulu</title>
  <link rel="icon" href="images/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
</head>
<body class="dashboard-page">

  <!-- Loading Screen — shown until auth state is confirmed -->
  <div class="auth-loading" id="authLoading">
    <div class="auth-spinner"></div>
    <p>Verifying access...</p>
  </div>

  <!-- Dashboard — hidden until auth confirmed -->
  <div class="dashboard" id="dashboard" style="display:none">

    <!-- Top Navbar -->
    <header class="admin-header">
      <div class="admin-header-left">
        <img src="images/logo.jpg" alt="Logo" class="admin-logo">
        <div>
          <h1 class="admin-brand">Me Ma Mana Ruchulu</h1>
          <p class="admin-label">Admin Dashboard</p>
        </div>
      </div>
      <div class="admin-header-right">
        <span class="admin-email" id="adminEmail"></span>
        <button class="logout-btn" id="logoutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="admin-main">
      <!-- Welcome Section -->
      <div class="welcome-card">
        <h2>Welcome, Admin!</h2>
        <p>Manage your Me Ma Mana Ruchulu business from here.</p>
        <p class="login-time" id="loginTime"></p>
      </div>

      <!-- Summary Cards (dynamic) -->
      <div class="summary-grid">
        <div class="summary-card summary-today">
          <div class="summary-label">Today's Orders</div>
          <div class="summary-value" id="sumToday">0</div>
        </div>
        <div class="summary-card summary-pending">
          <div class="summary-label">Pending</div>
          <div class="summary-value" id="sumPending">0</div>
        </div>
        <div class="summary-card summary-completed">
          <div class="summary-label">Completed</div>
          <div class="summary-value" id="sumCompleted">0</div>
        </div>
        <div class="summary-card summary-revenue">
          <div class="summary-label">Total Revenue</div>
          <div class="summary-value" id="sumRevenue">₹0</div>
        </div>
      </div>

      <!-- Orders Section -->
      <div class="orders-section">
        <div class="orders-header">
          <h2 class="section-label">Orders</h2>
          <span class="orders-count" id="ordersCount"></span>
        </div>

        <!-- Search + Filters -->
        <div class="orders-toolbar">
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search by name or phone...">
          </div>

          <div class="filter-group">
            <select id="statusFilter" class="filter-select">
              <option value="all">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="preparing">Preparing</option>
              <option value="out_for_delivery">Out for Delivery</option>
              <option value="delivered">Delivered</option>
            </select>

            <select id="dateFilter" class="filter-select">
              <option value="all">All Dates</option>
              <option value="today">Today Only</option>
            </select>
          </div>
        </div>

        <div class="orders-list" id="ordersList">
          <div class="orders-loading">
            <div class="auth-spinner"></div>
            <p>Loading orders...</p>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="actions-section">
        <h2 class="section-label">Quick Actions</h2>
        <div class="actions-grid">
          <a href="index.html" target="_blank" class="action-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            <span>View Website</span>
          </a>
          <a href="https://wa.me/919502043575" target="_blank" class="action-card">
            <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <span>WhatsApp Orders</span>
          </a>
          <a href="https://console.firebase.google.com/" target="_blank" class="action-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            <span>Firebase Console</span>
          </a>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="admin.js"></script>
</body>
</html>
