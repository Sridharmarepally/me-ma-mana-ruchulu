<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Me Ma Mana Ruchulu</title>
  <link rel="icon" href="images/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="track-order.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
</head>
<body class="track-page">

  <!-- Simple header -->
  <header class="track-header">
    <a href="index.html" class="track-brand">
      <img src="images/logo.jpg" alt="Logo" class="track-logo">
      <div>
        <h1>Me Ma Mana Ruchulu</h1>
        <p>Track Your Order</p>
      </div>
    </a>
    <a href="index.html" class="track-back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to Home
    </a>
  </header>

  <!-- Main content -->
  <main class="track-main">
    <div class="track-container">

      <!-- Search Card -->
      <div class="track-search-card">
        <div class="track-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="40" height="40">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <h2>Track Your Order</h2>
        <p class="track-hint">Enter your Order ID to check the current status</p>

        <form class="track-form" id="trackForm">
          <input
            type="text"
            id="orderIdInput"
            placeholder="e.g., MMR-2A5F9K"
            autocomplete="off"
            spellcheck="false"
            required
          >
          <button type="submit" id="trackBtn">
            <span class="track-btn-text">Track Order</span>
            <span class="track-btn-loader" style="display:none"></span>
          </button>
        </form>

        <div class="track-error" id="trackError"></div>
      </div>

      <!-- Result section (hidden initially) -->
      <div class="track-result" id="trackResult"></div>

    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="track-order.js"></script>
</body>
</html>
